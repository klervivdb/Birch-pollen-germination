<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birch pollen germination</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header with institution logos -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-item">
                    <img src="logo1.png" class="logo">
                </div>
                <div class="logo-item">
                    <img src="logo2.jpg" class="logo">
                </div>
                <div class="logo-item">
                    <img src="logo3.png" class="logo">
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <div class="title-section">
                <h1 class="study-title">Birch pollen germination</h1>
            </div>

            <!-- Video container -->
            <div class="video-wrapper">
                <div class="video-container">
                    <video id="research-video" controls preload="metadata">
                        <source src="research-video.mp4" type="video/mp4">
                        <source src="research-video.webm" type="video/webm">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <!-- Author information -->
            <div class="author-section">
                <p class="author-info">Klervi Vandenbossche</p>
                <p class="affiliation">University of Lille</p>
                <p class="date">2026</p>
            </div>
        </main>

        <!-- Footer with partner logos -->
        <footer class="footer">
            <div class="partner-logos">
                <div class="partner-item">
                    <img src="logo4.png" class="partner-logo">
                </div>
                <div class="partner-item">
                    <img src="logo5.png" class="partner-logo">
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
